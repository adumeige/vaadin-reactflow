name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Maven build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and test
        run: mvn -B -ntp -Pproduction verify

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            component/target/*.jar
            demo/target/*.jar
          if-no-files-found: error
          retention-days: 7
